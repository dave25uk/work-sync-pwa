<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkSync</title>
    <link rel="stylesheet" href="/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900 antialiased">

    <header class="bg-white border-b p-4 sticky top-0 z-10 flex justify-between items-center shadow-sm">
        <h1 class="text-xl font-black text-slate-800 tracking-tight">WorkSync</h1>
        <button id="fetchBtn" class="bg-gradient-to-r from-blue-600 to-blue-500 text-white px-6 py-2 rounded-full text-xs font-bold shadow-lg shadow-blue-200 active:scale-95 transition-all">
    Sync iCloud
</button>
    </header>

    <main class="p-3 max-w-lg mx-auto">
        <div class="flex justify-between items-center mb-5 px-1">
            <button id="prevMonth" class="p-2 bg-white border border-slate-200 rounded-xl shadow-sm active:bg-slate-100">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            </button>
            
            <h2 id="currentMonthLabel" class="text-xl font-black tracking-tight text-slate-800">
    April 2026
</h2>
            
            <button id="nextMonth" class="p-2 bg-white border border-slate-200 rounded-xl shadow-sm active:bg-slate-100">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
            </button>
        </div>

        <div class="grid grid-cols-7 mb-2 text-center text-[10px] font-black text-slate-400 uppercase tracking-tighter">
            <div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div><div>Sun</div>
        </div>

        <div class="grid grid-cols-7 gap-1.5" id="calendar">
            </div>
    </main>

    <div id="shiftPicker" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-20 hidden items-end">
        <div class="bg-white w-full rounded-t-3xl p-6 shadow-2xl transition-transform duration-300">
            <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-6"></div>
            <h3 class="text-lg font-bold mb-4 text-center" id="selectedDateLabel">Select Shift</h3>
            <div class="grid grid-cols-2 gap-3" id="optionsGrid"></div>
            <button id="closePickerBtn" class="w-full mt-6 py-3 text-slate-400 font-medium">Cancel</button>
        </div>
    </div>

    <script src="app.js" type="module"></script>
</body>
</html>
